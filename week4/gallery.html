<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="gallery.css">
</head>
<body>

<section class="gallery-section">
    <h1>My Gallery</h1>
    <p class="subtitle">Explore images using category tabs</p>

    <div class="filter-tabs">
        <span class="tab active">All</span>
        <span class="tab">Nature</span>
        <span class="tab">Technology</span>
        <span class="tab">Architecture</span>
        <span class="tab">People</span>
    </div>

    <div class="gallery-grid">
        <div class="gallery-item">
            <img src="https://picsum.photos/400/300?1" alt="Image 1">
        </div>
        <div class="gallery-item">
            <img src="https://picsum.photos/400/300?2" alt="Image 2">
        </div>
        <div class="gallery-item">
            <img src="https://picsum.photos/400/300?3" alt="Image 3">
        </div>
        <div class="gallery-item">
            <img src="https://picsum.photos/400/300?4" alt="Image 4">
        </div>
        <div class="gallery-item">
            <img src="https://picsum.photos/400/300?5" alt="Image 5">
        </div>
        <div class="gallery-item">
            <img src="https://picsum.photos/400/300?6" alt="Image 6">
        </div>
    </div>
</section>
</body>
</html>
