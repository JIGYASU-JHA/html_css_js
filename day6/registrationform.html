<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 420px;
            border: 2px solid black;
            background-color: white;
            padding: 25px 20px 20px; 
        }

        .card h2 {
            text-align: center;
            margin-top: 0;          
            margin-bottom: 20px;   
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 6px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        .inline {
            width: auto;
            margin-right: 10px;
        }

        .group {
            margin-top: 10px;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 8px;
            font-size: 15px;
            cursor: pointer;
            background:#1f5ae0;
        }

        button:hover{
            background:#1f5ae0;
            color:white
        }

        #errorMsg {
            color: red;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>Registration Form</h2>
    <form onsubmit="return validateForm()">
        <label>Name</label>
        <input type="text" id="name">
        <label>Email</label>
        <input type="text" id="email">
        <label>Telephone</label>
        <input type="text" id="tel">
        <label>Password</label>
        <input type="password" id="password">
        <label>Confirm Password</label>
        <input type="password" id="confirm">
        <label>Date of Birth</label>
        <input type="date" id="dob" onchange="calcAge()">
        <label>Age</label>
        <input type="text" id="age" readonly>
        <label>Gender</label>
        <div class="group">
            <input type="radio" name="gender" class="inline"> Male
            <input type="radio" name="gender" class="inline"> Female
        </div>

        <label>Hobbies</label>
        <div class="group">
            <input type="checkbox" class="inline"> Reading
            <input type="checkbox" class="inline"> Sports
            <input type="checkbox" class="inline"> Music
        </div>
        <label>Address</label>
        <textarea rows="3"></textarea>
        <button type="submit">Register</button>
        <div id="errorMsg"></div>
    </form>
</div>

<script>
function calcAge() {
    let dob = new Date(document.getElementById("dob").value);
    let today = new Date();
    let age = today.getFullYear() - dob.getFullYear();
    document.getElementById("age").value = age;
}

function validateForm() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let tel = document.getElementById("tel").value;
    let password = document.getElementById("password").value;
    let confirm = document.getElementById("confirm").value;
    let age = document.getElementById("age").value;
    let error = document.getElementById("errorMsg");

    error.innerText = "";
    if (name.trim() === "") {
        error.innerText = "Name cannot be empty";
        return false;
    }

    if (email.trim() === "") {
        error.innerText = "Email cannot be empty";
        return false;
    }

    if (isNaN(tel) || tel.length !== 10) {
        error.innerText = "Telephone must be 10 digits";
        return false;
    }

    if (password === "") {
        error.innerText = "Password required";
        return false;
    }

    if (password !== confirm) {
        error.innerText = "Passwords do not match";
        return false;
    }

    if (age < 18) {
        error.innerText = "Age must be above 18";
        return false;
    }
    alert("Registration Successful");
    return true;
}
</script>
</body>
</html>
